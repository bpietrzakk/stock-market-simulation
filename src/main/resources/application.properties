spring.application.name=stockmarket

# database connection
spring.datasource.url=jdbc:postgresql://localhost:5432/stockmarket
spring.datasource.username=stockmarket
spring.datasource.password=stockmarket

# JPA / hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# automatically converts camelCase to snake_case
spring.jackson.property-naming-strategy=SNAKE_CASE
