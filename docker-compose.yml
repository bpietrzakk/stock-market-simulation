services:
  postgres:
    image: postgres:16-alpine
    container_name: stockmarket-postgres
    environment:
      POSTGRES_USER: stockmarket
      POSTGRES_PASSWORD: stockmarket
      POSTGRES_DB: stockmarket
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockmarket -d stockmarket"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    container_name: stockmarket-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/stockmarket
      SPRING_DATASOURCE_USERNAME: stockmarket
      SPRING_DATASOURCE_PASSWORD: stockmarket
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
