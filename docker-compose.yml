services:
  postgres:
    image: postgres:16-alpine
    container_name: stockmarket-postgres
    environment:
      POSTGRES_USER: stockmarket
      POSTGRES_PASSWORD: stockmarket
      POSTGRES_DB: stockmarket
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockmarket -d stockmarket"]
      interval: 5s
      timeout: 3s
      retries: 10

  app-1:
    build: .
    container_name: stockmarket-app-1
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/stockmarket
      SPRING_DATASOURCE_USERNAME: stockmarket
      SPRING_DATASOURCE_PASSWORD: stockmarket
    depends_on:
      postgres:
        condition: service_healthy

  app-2:
    build: .
    container_name: stockmarket-app-2
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/stockmarket
      SPRING_DATASOURCE_USERNAME: stockmarket
      SPRING_DATASOURCE_PASSWORD: stockmarket
    depends_on:
      postgres:
        condition: service_healthy
      app-1:
        condition: service_started

  nginx:
    image: nginx:alpine
    container_name: stockmarket-nginx
    ports:
      - "${PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app-1
      - app-2

volumes:
  postgres-data: