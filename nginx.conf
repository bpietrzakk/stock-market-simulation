events {
    worker_connections 1024;
}

http {
    upstream stockmarket_backend {
        least_conn;
        server app-1:8080 max_fails=1 fail_timeout=5s;
        server app-2:8080 max_fails=1 fail_timeout=5s;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://stockmarket_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # if one instance crashes (e.g. /chaos), redirect to the other instead of returning 502
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_connect_timeout 2s;
        }
    }
}